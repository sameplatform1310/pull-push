<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PushPull</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- HOME VIEW -->
      <div id="home" class="view active">
        <button class="log-btn" onclick="logExercise('pushup')">Pushup</button>
        <button class="log-btn" onclick="logExercise('pullup')">Pullup</button>
      </div>

      <!-- TIMELINE VIEW -->
      <div id="timeline" class="view">
        <!-- Content generated by JS -->
      </div>

      <!-- SETTINGS VIEW -->
      <div id="settings" class="view">
        <div class="settings-card">
          <div class="settings-row">
            <span>Dark Mode</span>
            <input
              type="checkbox"
              id="theme-toggle"
              onchange="toggleTheme()"
              style="transform: scale(1.5)"
            />
          </div>
          <hr style="border: 0; border-top: 1px solid var(--border)" />
          <button class="settings-btn" onclick="exportData()">
            ⬇️ Export Data
          </button>
          <button
            class="settings-btn"
            onclick="document.getElementById('import-file').click()"
          >
            ⬆️ Import Data
          </button>
          <input
            type="file"
            id="import-file"
            accept=".json"
            style="display: none"
            onchange="importData(event)"
          />
        </div>
      </div>

      <!-- UNDO TOAST -->
      <div id="undo-toast" class="toast">
        <span id="toast-msg">Logged</span>
        <button class="undo-btn" onclick="undoLastLog()">UNDO</button>
      </div>

      <!-- DELETE CONFIRMATION MODAL -->
      <div id="delete-modal" class="modal-overlay">
        <div class="modal">
          <div class="modal-text">Delete this entry?</div>
          <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeDeleteModal()">
              Cancel
            </button>
            <button class="modal-btn delete" onclick="confirmDelete()">
              Delete
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="nav-btn active" onclick="switchView('home', this)">
        <svg viewBox="0 0 24 24">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
        </svg>
      </button>
      <button class="nav-btn" onclick="switchView('timeline', this)">
        <svg viewBox="0 0 24 24">
          <path
            d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"
          />
        </svg>
      </button>
      <button class="nav-btn" onclick="switchView('settings', this)">
        <svg viewBox="0 0 24 24">
          <path
            d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"
          />
        </svg>
      </button>
    </nav>
    <script src="script.js"></script>
  </body>
</html>
